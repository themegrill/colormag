name: Notify Pro on Push

on:
  push:
    branches:
      - free-pro-sync

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync event to colormag-pro
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: themegrill/colormag-pro
          event-type: free-theme-updated
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
